name: Newman Automated API Tests

# Trigger the workflow on push or pull request
on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

# Set the job to run on Ubuntu

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # Install Newman and the HTML Extra Reporter globally
      - name: Install Newman and HTML Extra Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      # Run the API tests using Newman and generate an HTML report
      - name: Run API Tests and Generate Report
        run: newman run "Simple_Grocery_Store_API.postman_collection.json" -r cli,htmlextra --reporter-htmlextra-export newman-report.html
        # Continue even if there are test failures
        continue-on-error: true

      # Upload the generated HTML report as an artifact for later review
      - name: Upload HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: newman-api-report
          path: newman-report.html
