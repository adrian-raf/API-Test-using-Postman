name: Newman Automated API Tests CI/CD

# Trigger the workflow on push or pull request
on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

# Permission for GitHub Actions to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Set the job to run on Ubuntu
jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # Install Newman and the HTML Extra Reporter globally
      - name: Install Newman and HTML Extra Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      # Create folder 'public' for the report
      - name: Create Report Directory
        run: mkdir -p public

      # Run the API tests using Newman and generate an HTML report
      - name: Run API Tests and Generate Report
        id: run-tests
        # Run Newman with the specified collection and generate an HTML report in the 'public' folder
        run: newman run "Simple Grocery Store API.postman_collection.json" -r cli,htmlextra --reporter-htmlextra-export public/index.html
        # Continue even if there are test failures
        continue-on-error: true

      # Packaging the 'public' folder into a custom artifact for GitHub Pages
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Check Test Status
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "Tests failed, marking workflow as failed after report upload."
          exit 1

  deploy-to-pages:
    # This job will only run if the 'test-api' job completes successfully
    needs: test-api
    runs-on: ubuntu-latest

    # Set up the environment for GitHub Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
